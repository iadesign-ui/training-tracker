<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#F4F5F7">
  <meta name="application-name" content="Тренировки">
  <meta name="apple-mobile-web-app-title" content="Тренировки">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icons/icon-180.png">
  <title>Тренировки</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #F4F5F7;
      --card: #FFFFFF;
      --soft: #F7F8FA;
      --soft-2: #EEF0F4;
      --text: #111111;
      --muted: #747985;
      --border: #E4E6EB;
      --black: #111111;
      --white: #FFFFFF;
      --danger: #C2410C;
      --green: #1A7F37;
      --radius-xl: 24px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --shadow: 0 10px 28px rgba(17, 17, 17, 0.04);
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Arial, sans-serif;
    }

    body {
      padding: 12px;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      color: inherit;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--text);
      border-radius: 16px;
      outline: none;
      padding: 12px 14px;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--black);
      box-shadow: 0 0 0 4px rgba(17,17,17,.06);
    }

    .app {
      width: min(100%, 430px);
      margin: 0 auto;
      display: grid;
      gap: 10px;
      padding-bottom: calc(28px + env(safe-area-inset-bottom));
    }

    .header {
      height: 68px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0;
      font-size: 31px;
      line-height: 1;
      letter-spacing: -0.055em;
      font-weight: 850;
    }

    h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.08;
      letter-spacing: -0.04em;
      font-weight: 820;
    }

    h3 {
      margin: 0;
      font-size: 20px;
      line-height: 1.1;
      letter-spacing: -0.04em;
      font-weight: 820;
    }

    .gear,
    .nav-btn,
    .square-plus,
    .close-btn {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--soft-2);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .gear svg,
    .nav-btn svg,
    .close-btn svg {
      width: 22px;
      height: 22px;
    }

    .panel {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .progress-panel {
      padding: 14px;
      display: grid;
      gap: 14px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      min-height: 48px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--soft-2);
      padding: 4px;
      overflow: hidden;
    }

    .tab {
      border-radius: 15px;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
    }

    .tab.active {
      background: var(--black);
      color: var(--white);
      font-weight: 700;
    }

    .label {
      margin: 0;
      font-size: 11px;
      line-height: 1;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .progress-percent {
      margin: 8px 0 0;
      font-size: clamp(72px, 24vw, 120px);
      line-height: .82;
      letter-spacing: -0.09em;
      font-weight: 900;
    }

    .progress-meta {
      margin: 12px 0 0;
      font-size: 13px;
      line-height: 1.2;
      color: var(--muted);
    }

    .progress-bar {
      height: 12px;
      border-radius: 999px;
      background: #E4E6EB;
      overflow: hidden;
    }

    .progress-bar span {
      display: block;
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: var(--black);
      transition: width .2s ease;
    }

    .progress-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .progress-stat {
      min-height: 66px;
      display: grid;
      place-items: center;
      background: var(--soft);
      border: 1px solid var(--border);
      border-radius: 17px;
      text-align: center;
      padding: 8px;
    }

    .progress-stat b {
      display: block;
      font-size: 21px;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .progress-stat small {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 11px;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 10px;
      padding: 0 0 2px;
    }

    .section-title .count {
      color: var(--muted);
      font-size: 16px;
      line-height: 1;
    }

    .goal-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px;
      display: grid;
      gap: 14px;
      box-shadow: var(--shadow);
    }

    .goal-head {
      display: grid;
      grid-template-columns: 25px 1fr auto;
      align-items: start;
      gap: 10px;
    }

    .check {
      width: 25px;
      height: 25px;
      border-radius: 9px;
      border: 1.5px solid #B9BEC8;
      background: var(--white);
      display: grid;
      place-items: center;
    }

    .check.done {
      border-color: var(--black);
      background: var(--black);
    }

    .check.done::after {
      content: "";
      width: 10px;
      height: 6px;
      border-left: 2px solid var(--white);
      border-bottom: 2px solid var(--white);
      transform: rotate(-45deg) translate(1px,-1px);
    }

    .goal-title {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .goal-title strong {
      display: block;
      font-size: 22px;
      line-height: 1.05;
      letter-spacing: -0.045em;
      font-weight: 850;
      overflow-wrap: anywhere;
    }

    .start-btn {
      min-width: 64px;
      height: 38px;
      border-radius: 13px;
      background: var(--black);
      color: var(--white);
      padding: 0 14px;
      font-size: 12px;
    }

    .start-btn.done {
      background: var(--soft-2);
      color: var(--black);
      border: 1px solid var(--border);
    }

    .series-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .streak {
      text-transform: none;
      letter-spacing: 0;
      font-size: 12px;
      color: var(--muted);
    }

    .week {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .weekday {
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 4px;
    }

    .week-day {
      min-height: 49px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--soft);
      display: grid;
      place-items: center;
      font-size: 16px;
      line-height: 1;
    }

    .week-day.done {
      background: var(--black);
      color: var(--white);
      border-color: var(--black);
    }

    .week-day.today {
      border-color: var(--black);
      box-shadow: inset 0 0 0 1px var(--black);
    }

    .week-day.out {
      opacity: .45;
    }

    .add-row {
      display: grid;
      grid-template-columns: 1fr 56px;
      gap: 4px;
      margin-top: 2px;
    }

    .add-row input {
      height: 54px;
      border-radius: 18px;
      font-size: 16px;
    }

    .square-plus {
      width: 56px;
      height: 54px;
      border-radius: 18px;
      background: var(--black);
      color: var(--white);
      border-color: var(--black);
      font-size: 22px;
    }

    .task-panel {
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    .task-list {
      display: grid;
      gap: 10px;
    }

    .task-row {
      display: grid;
      grid-template-columns: 25px 1fr auto;
      align-items: center;
      gap: 10px;
      min-height: 53px;
      background: var(--soft);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 10px 10px 10px 14px;
    }

    .task-row.done .task-name {
      color: var(--muted);
      text-decoration: line-through;
    }

    .task-name {
      min-width: 0;
      font-size: 16px;
      overflow-wrap: anywhere;
    }

    .task-delete {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      background: transparent;
      color: var(--muted);
      border-radius: 10px;
      font-size: 20px;
    }

    .task-row .start-btn {
      min-width: 66px;
      height: 36px;
    }

    .calendar-panel {
      padding: 14px;
    }

    .calendar-head {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .calendar-nav {
      display: flex;
      gap: 8px;
    }

    .calendar-grid,
    .calendar-weekdays {
      display: grid;
      grid-template-columns: repeat(7, minmax(0,1fr));
      gap: 6px;
    }

    .calendar-weekdays {
      margin-bottom: 6px;
    }

    .calendar-weekdays span {
      text-align: center;
      color: var(--muted);
      font-size: 10px;
      text-transform: lowercase;
    }

    .cal-day {
      min-height: 60px;
      border-radius: 15px;
      border: 1px solid var(--border);
      background: var(--soft);
      display: grid;
      place-items: center;
      align-content: center;
      gap: 6px;
      padding: 4px;
    }

    .cal-day.out {
      opacity: .35;
    }

    .cal-day.selected {
      background: var(--white);
      border-color: var(--black);
      box-shadow: inset 0 0 0 1px var(--black);
    }

    .cal-day.today:not(.selected) {
      border-color: var(--black);
    }

    .cal-num {
      font-size: 14px;
      line-height: 1;
      font-weight: 700;
    }

    .cal-dots {
      display: flex;
      justify-content: center;
      gap: 3px;
      min-height: 5px;
    }

    .cal-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #D2D5DA;
    }

    .cal-dot.done {
      background: var(--black);
    }

    .drawer-backdrop {
      position: fixed;
      inset: 0;
      z-index: 40;
      background: rgba(0,0,0,.32);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }

    .drawer-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 50;
      width: min(100%, 430px);
      max-height: 88vh;
      transform: translate(-50%, calc(100% + 24px));
      transition: transform .24s ease;
      background: var(--white);
      border-radius: 28px 28px 0 0;
      box-shadow: 0 -24px 80px rgba(0,0,0,.2);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .drawer.open {
      transform: translate(-50%, 0);
    }

    .drawer-grip {
      width: 44px;
      height: 5px;
      border-radius: 999px;
      background: #D8DBE1;
      margin: 10px auto 0;
      flex: 0 0 auto;
    }

    .drawer-head {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
      padding: 16px 14px 12px;
      border-bottom: 1px solid var(--border);
      flex: 0 0 auto;
    }

    .drawer-body {
      overflow: auto;
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .settings-grid {
      display: grid;
      gap: 10px;
    }

    .settings-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .full-btn {
      min-height: 46px;
      border-radius: 16px;
      background: var(--black);
      color: var(--white);
      padding: 10px 12px;
    }

    .full-btn.secondary {
      background: var(--white);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .full-btn.danger {
      background: #FEE2D5;
      color: var(--danger);
      border: 1px solid #FED7AA;
    }

    .file-btn input {
      display: none;
    }

    .empty {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      padding: 8px 2px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(18px + env(safe-area-inset-bottom));
      transform: translate(-50%, 16px);
      z-index: 80;
      background: var(--black);
      color: var(--white);
      border-radius: 999px;
      padding: 11px 15px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (min-width: 800px) {
      body {
        padding: 24px;
      }

      .app {
        width: min(100%, 1080px);
        grid-template-columns: 430px minmax(0, 1fr);
        align-items: start;
      }

      .header,
      .progress-panel,
      .goals-wrap {
        grid-column: 1;
      }

      .desktop-col {
        display: grid;
        gap: 10px;
      }

      .calendar-panel {
        position: sticky;
        top: 24px;
      }

      .drawer {
        left: auto;
        right: 24px;
        top: 24px;
        bottom: 24px;
        width: 430px;
        max-height: none;
        transform: translateX(calc(100% + 40px));
        border-radius: 28px;
      }

      .drawer.open {
        transform: translateX(0);
      }

      .drawer-grip {
        display: none;
      }
    }

    @media (max-width: 365px) {
      .progress-stat b {
        font-size: 18px;
      }

      .goal-title strong {
        font-size: 20px;
      }

      .week-day {
        min-height: 44px;
        border-radius: 14px;
      }

      .cal-day {
        min-height: 54px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>Тренировки</h1>
      <button class="gear" id="settingsBtn" aria-label="Настройки">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" stroke="currentColor" stroke-width="1.7"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.04.04a2 2 0 1 1-2.83 2.83l-.04-.04a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1.04 1.56V21a2 2 0 1 1-4 0v-.08A1.7 1.7 0 0 0 8.96 19.4a1.7 1.7 0 0 0-1.87.34l-.04.04a2 2 0 1 1-2.83-2.83l.04-.04A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.56-1.04H3a2 2 0 1 1 0-4h.08A1.7 1.7 0 0 0 4.6 8.96a1.7 1.7 0 0 0-.34-1.87l-.04-.04a2 2 0 0 1 2.83-2.83l.04.04A1.7 1.7 0 0 0 8.96 4.6 1.7 1.7 0 0 0 10 3.04V3a2 2 0 1 1 4 0v.08A1.7 1.7 0 0 0 15.04 4.6a1.7 1.7 0 0 0 1.87-.34l.04-.04a2 2 0 1 1 2.83 2.83l-.04.04A1.7 1.7 0 0 0 19.4 8.96 1.7 1.7 0 0 0 20.96 10H21a2 2 0 1 1 0 4h-.08A1.7 1.7 0 0 0 19.4 15Z" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
      </button>
    </header>

    <section class="panel progress-panel">
      <div class="tabs" role="tablist">
        <button class="tab active" data-scope="day">День</button>
        <button class="tab" data-scope="week">Неделя</button>
        <button class="tab" data-scope="month">Месяц</button>
        <button class="tab" data-scope="period">Весь срок</button>
      </div>

      <div>
        <p class="label" id="progressLabel">прогресс дня</p>
        <div class="progress-percent" id="progressPercent">0%</div>
        <p class="progress-meta" id="progressMeta">—</p>
      </div>

      <div class="progress-bar"><span id="progressBar"></span></div>

      <div class="progress-stats">
        <div class="progress-stat">
          <div>
            <b id="strengthStat">0/80</b>
            <small>силовые</small>
          </div>
        </div>
        <div class="progress-stat">
          <div>
            <b id="cardioStat">0/185</b>
            <small>кардио</small>
          </div>
        </div>
      </div>
    </section>

    <section class="goals-wrap" id="goalsWrap">
      <div class="section-title">
        <h2>Цели</h2>
        <span class="count" id="goalsCount">0/0</span>
      </div>
      <div id="goalsList" style="display:grid; gap:10px; margin-top:10px;"></div>

      <form class="add-row" id="goalForm">
        <input id="goalInput" type="text" placeholder="Добавить цель">
        <button class="square-plus" type="submit" aria-label="Добавить цель">+</button>
      </form>
    </section>

    <div class="desktop-col">
      <section class="panel task-panel">
        <h3>Дела на день</h3>
        <div class="task-list" id="taskList"></div>
        <form class="add-row" id="taskForm">
          <input id="taskInput" type="text" placeholder="Добавить задачу">
          <button class="square-plus" type="submit" aria-label="Добавить задачу">+</button>
        </form>
      </section>

      <section class="panel calendar-panel">
        <div class="calendar-head">
          <div>
            <p class="label">месяц</p>
            <h3 id="monthTitle">—</h3>
          </div>
          <div class="calendar-nav">
            <button class="nav-btn" id="prevMonth" aria-label="Предыдущий месяц">
              <svg viewBox="0 0 24 24" fill="none"><path d="m15 18-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button class="nav-btn" id="nextMonth" aria-label="Следующий месяц">
              <svg viewBox="0 0 24 24" fill="none"><path d="m9 18 6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </div>

        <div class="calendar-weekdays">
          <span>пн</span><span>вт</span><span>ср</span><span>чт</span><span>пт</span><span>сб</span><span>вс</span>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </section>
    </div>
  </main>

  <div class="drawer-backdrop" id="backdrop"></div>

  <aside class="drawer" id="settingsDrawer" aria-hidden="true">
    <div class="drawer-grip"></div>
    <div class="drawer-head">
      <div>
        <p class="label">настройки</p>
        <h3>Трекер</h3>
      </div>
      <button class="close-btn" id="closeSettings" aria-label="Закрыть">
        <svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6 6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="drawer-body">
      <section class="panel" style="box-shadow:none;">
        <div class="settings-grid">
          <label>
            <p class="label">выбранная дата</p>
            <input id="selectedDateInput" type="date">
          </label>
          <label>
            <p class="label">дата старта</p>
            <input id="startDateInput" type="date">
          </label>
          <label>
            <p class="label">срок</p>
            <select id="periodInput">
              <option value="3">3 месяца</option>
              <option value="6">6 месяцев</option>
              <option value="9">9 месяцев</option>
              <option value="12">12 месяцев</option>
            </select>
          </label>
          <label>
            <p class="label">цель по силовым</p>
            <input id="strengthTargetInput" type="number" min="1" step="1">
          </label>
          <label>
            <p class="label">цель по кардио</p>
            <input id="cardioTargetInput" type="number" min="1" step="1">
          </label>
          <button class="full-btn" id="saveSettings">Сохранить</button>
        </div>
      </section>

      <section class="panel" style="box-shadow:none;">
        <h3 style="margin-bottom:12px;">Данные</h3>
        <div class="settings-actions">
          <button class="full-btn secondary" id="exportBtn">Экспорт</button>
          <label class="full-btn secondary file-btn" style="display:grid; place-items:center;">Импорт<input id="importFile" type="file" accept=".json,application/json"></label>
        </div>
        <button class="full-btn danger" id="resetBtn" style="margin-top:8px;">Сбросить всё</button>
      </section>
    </div>
  </aside>

  <div class="toast" id="toast"></div>

  <script>
    (function(){
      var STORAGE_KEY = "training_tracker_figma_ui_v2";
      var months = ["январь","февраль","март","апрель","май","июнь","июль","август","сентябрь","октябрь","ноябрь","декабрь"];
      var shortWeekdays = ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];

      function $(id){ return document.getElementById(id); }

      var el = {
        settingsBtn: $("settingsBtn"),
        closeSettings: $("closeSettings"),
        settingsDrawer: $("settingsDrawer"),
        backdrop: $("backdrop"),
        progressLabel: $("progressLabel"),
        progressPercent: $("progressPercent"),
        progressMeta: $("progressMeta"),
        progressBar: $("progressBar"),
        strengthStat: $("strengthStat"),
        cardioStat: $("cardioStat"),
        goalsCount: $("goalsCount"),
        goalsList: $("goalsList"),
        goalForm: $("goalForm"),
        goalInput: $("goalInput"),
        taskList: $("taskList"),
        taskForm: $("taskForm"),
        taskInput: $("taskInput"),
        monthTitle: $("monthTitle"),
        calendarGrid: $("calendarGrid"),
        prevMonth: $("prevMonth"),
        nextMonth: $("nextMonth"),
        selectedDateInput: $("selectedDateInput"),
        startDateInput: $("startDateInput"),
        periodInput: $("periodInput"),
        strengthTargetInput: $("strengthTargetInput"),
        cardioTargetInput: $("cardioTargetInput"),
        saveSettings: $("saveSettings"),
        exportBtn: $("exportBtn"),
        importFile: $("importFile"),
        resetBtn: $("resetBtn"),
        toast: $("toast")
      };

      var state = loadState();
      var selectedDate = todayKey();
      var currentMonth = startOfMonth(parseKey(selectedDate));
      var activeScope = "day";
      var saveTimer = null;

      init();

      function init(){
        ensureState();
        bind();
        renderAll();
      }

      function bind(){
        var tabs = document.querySelectorAll(".tab");
        for(var i=0; i<tabs.length; i++){
          tabs[i].addEventListener("click", function(){
            for(var j=0; j<tabs.length; j++) tabs[j].classList.remove("active");
            this.classList.add("active");
            activeScope = this.getAttribute("data-scope");
            renderProgress();
          });
        }

        el.prevMonth.addEventListener("click", function(){
          currentMonth.setMonth(currentMonth.getMonth() - 1);
          renderAll();
        });

        el.nextMonth.addEventListener("click", function(){
          currentMonth.setMonth(currentMonth.getMonth() + 1);
          renderAll();
        });

        el.goalForm.addEventListener("submit", function(e){
          e.preventDefault();
          var title = trim(el.goalInput.value);
          if(!title) return;
          state.goals.push({
            id: "goal_" + Date.now() + "_" + Math.floor(Math.random() * 10000),
            title: title,
            target: 30,
            system: false
          });
          el.goalInput.value = "";
          saveAndRender("цель добавлена");
        });

        el.taskForm.addEventListener("submit", function(e){
          e.preventDefault();
          var title = trim(el.taskInput.value);
          if(!title) return;
          var day = getDay(selectedDate);
          day.tasks.push({
            id: "task_" + Date.now() + "_" + Math.floor(Math.random() * 10000),
            title: title,
            done: false
          });
          el.taskInput.value = "";
          saveAndRender("задача добавлена");
        });

        el.settingsBtn.addEventListener("click", openSettings);
        el.closeSettings.addEventListener("click", closeSettings);
        el.backdrop.addEventListener("click", closeSettings);

        el.saveSettings.addEventListener("click", function(){
          selectedDate = el.selectedDateInput.value || todayKey();
          state.settings.startDate = el.startDateInput.value || todayKey();
          state.settings.months = Number(el.periodInput.value || 6);
          state.settings.targets.strength = Math.max(1, Number(el.strengthTargetInput.value || 80));
          state.settings.targets.cardio = Math.max(1, Number(el.cardioTargetInput.value || 185));
          currentMonth = startOfMonth(parseKey(selectedDate));
          saveAndRender("настройки сохранены");
          closeSettings();
        });

        el.exportBtn.addEventListener("click", exportData);
        el.importFile.addEventListener("change", importData);

        el.resetBtn.addEventListener("click", function(){
          if(!confirm("Сбросить все отметки, цели, задачи и заметки?")) return;
          state = defaultState();
          selectedDate = todayKey();
          currentMonth = startOfMonth(parseKey(selectedDate));
          saveAndRender("данные сброшены");
          closeSettings();
        });
      }

      function defaultState(){
        return {
          settings: {
            startDate: todayKey(),
            months: 6,
            targets: {
              strength: 80,
              cardio: 185
            }
          },
          goals: [
            { id: "strength", title: "Силовая", target: 80, system: true },
            { id: "cardio", title: "Кардио", target: 185, system: true }
          ],
          days: {}
        };
      }

      function ensureState(){
        if(!state || typeof state !== "object") state = defaultState();
        if(!state.settings) state.settings = {};
        if(!state.settings.startDate) state.settings.startDate = todayKey();
        if(!state.settings.months) state.settings.months = 6;
        if(!state.settings.targets) state.settings.targets = { strength: 80, cardio: 185 };
        if(!state.goals || Object.prototype.toString.call(state.goals) !== "[object Array]") {
          state.goals = defaultState().goals;
        }
        if(!state.days) state.days = {};
        ensureSystemGoals();
      }

      function ensureSystemGoals(){
        var hasStrength = false;
        var hasCardio = false;
        for(var i=0;i<state.goals.length;i++){
          if(state.goals[i].id === "strength") hasStrength = true;
          if(state.goals[i].id === "cardio") hasCardio = true;
        }
        if(!hasStrength) state.goals.unshift({ id:"strength", title:"Силовая", target:80, system:true });
        if(!hasCardio) state.goals.push({ id:"cardio", title:"Кардио", target:185, system:true });
      }

      function loadState(){
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          if(raw) return JSON.parse(raw);
        } catch(e){}
        return defaultState();
      }

      function saveState(){
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        } catch(e){}
      }

      function getDay(key){
        if(!state.days[key]) {
          state.days[key] = { goals: {}, tasks: [], notes: "" };
        }
        var day = state.days[key];
        if(!day.goals) day.goals = {};
        if(!day.tasks || Object.prototype.toString.call(day.tasks) !== "[object Array]") day.tasks = [];
        if(typeof day.notes !== "string") day.notes = "";
        return day;
      }

      function renderAll(){
        renderProgress();
        renderGoals();
        renderTasks();
        renderCalendar();
      }

      function renderProgress(){
        var scope = getScope(activeScope);
        var stats = calcStats(scope.keys);
        var percent = stats.total ? Math.round(stats.done / stats.total * 100) : 0;
        var totals = calcSystemTotals(getVisibleKeys());

        el.progressLabel.textContent = scope.label;
        el.progressMeta.textContent = scope.meta;
        el.progressPercent.textContent = percent + "%";
        el.progressBar.style.width = percent + "%";
        el.strengthStat.textContent = totals.strength + "/" + state.settings.targets.strength;
        el.cardioStat.textContent = totals.cardio + "/" + state.settings.targets.cardio;
      }

      function getScope(scope){
        if(scope === "day"){
          return {
            keys: [selectedDate],
            label: "прогресс дня",
            meta: humanDate(parseKey(selectedDate))
          };
        }

        if(scope === "week"){
          var wk = getWeekKeys(parseKey(selectedDate));
          return {
            keys: wk,
            label: "прогресс недели",
            meta: humanDate(parseKey(wk[0])) + " — " + humanDate(parseKey(wk[6]))
          };
        }

        if(scope === "month"){
          return {
            keys: getMonthKeys(currentMonth),
            label: "прогресс месяца",
            meta: months[currentMonth.getMonth()] + " " + currentMonth.getFullYear()
          };
        }

        var keys = getVisibleKeys();
        return {
          keys: keys,
          label: "прогресс всего срока",
          meta: humanDate(parseKey(keys[0])) + " — " + humanDate(parseKey(keys[keys.length - 1]))
        };
      }

      function renderGoals(){
        var day = getDay(selectedDate);
        var done = 0;
        for(var i=0;i<state.goals.length;i++){
          if(day.goals[state.goals[i].id]) done++;
        }
        el.goalsCount.textContent = done + "/" + state.goals.length;
        el.goalsList.innerHTML = "";

        for(var g=0; g<state.goals.length; g++){
          el.goalsList.appendChild(renderGoalCard(state.goals[g]));
        }
      }

      function renderGoalCard(goal){
        var day = getDay(selectedDate);
        var isDone = !!day.goals[goal.id];
        var card = document.createElement("article");
        card.className = "goal-card";
        card.innerHTML =
          '<div class="goal-head">' +
            '<button class="check '+(isDone ? "done" : "")+'" data-action="toggle" aria-label="Отметить цель"></button>' +
            '<div class="goal-title"><strong>'+escapeHtml(goal.title)+'</strong></div>' +
            '<button class="start-btn '+(isDone ? "done" : "")+'" data-action="toggle">'+(isDone ? "Готово" : "Начать")+'</button>' +
          '</div>' +
          '<div>' +
            '<div class="series-head"><span>серия</span><span class="streak">'+goalStreak(goal.id)+' дней подряд</span></div>' +
            '<div class="week" data-week></div>' +
          '</div>';

        var toggles = card.querySelectorAll('[data-action="toggle"]');
        for(var i=0;i<toggles.length;i++){
          toggles[i].addEventListener("click", function(){
            toggleGoal(goal.id);
          });
        }

        var week = card.querySelector("[data-week]");
        var keys = getWeekKeys(parseKey(selectedDate));
        for(var w=0; w<7; w++){
          var date = parseKey(keys[w]);
          var wrap = document.createElement("div");
          wrap.innerHTML = '<div class="weekday">'+shortWeekdays[w]+'</div><button class="week-day '+(getDay(keys[w]).goals[goal.id] ? "done " : "")+(keys[w] === todayKey() ? "today " : "")+'">'+date.getDate()+'</button>';
          var btn = wrap.querySelector("button");
          btn.setAttribute("data-key", keys[w]);
          btn.addEventListener("click", function(){
            var key = this.getAttribute("data-key");
            var d = getDay(key);
            d.goals[goal.id] = !d.goals[goal.id];
            saveAndRender("сохранено");
          });
          week.appendChild(wrap);
        }

        if(!goal.system){
          var del = document.createElement("button");
          del.className = "task-delete";
          del.type = "button";
          del.textContent = "×";
          del.style.justifySelf = "end";
          del.setAttribute("aria-label", "Удалить цель");
          del.addEventListener("click", function(){
            if(!confirm("Удалить цель «"+goal.title+"»?")) return;
            removeGoal(goal.id);
          });
          card.appendChild(del);
        }

        return card;
      }

      function renderTasks(){
        var day = getDay(selectedDate);
        el.taskList.innerHTML = "";

        if(!day.tasks.length){
          el.taskList.innerHTML = '<div class="empty">Пока нет дел на выбранный день.</div>';
          return;
        }

        for(var i=0;i<day.tasks.length;i++){
          el.taskList.appendChild(renderTaskRow(day.tasks[i]));
        }
      }

      function renderTaskRow(task){
        var row = document.createElement("div");
        row.className = "task-row " + (task.done ? "done" : "");
        row.innerHTML =
          '<button class="check '+(task.done ? "done" : "")+'" data-action="toggle" aria-label="Отметить задачу"></button>' +
          '<span class="task-name">'+escapeHtml(task.title)+'</span>' +
          '<button class="start-btn '+(task.done ? "done" : "")+'" data-action="toggle">'+(task.done ? "Готово" : "Начать")+'</button>';

        var toggles = row.querySelectorAll('[data-action="toggle"]');
        for(var i=0;i<toggles.length;i++){
          toggles[i].addEventListener("click", function(){
            task.done = !task.done;
            saveAndRender("сохранено");
          });
        }

        row.querySelector(".task-name").addEventListener("click", function(){
          var next = prompt("Изменить задачу", task.title);
          if(next === null) return;
          next = trim(next);
          if(!next) return;
          task.title = next;
          saveAndRender("изменено");
        });

        return row;
      }

      function renderCalendar(){
        var y = currentMonth.getFullYear();
        var m = currentMonth.getMonth();
        el.monthTitle.textContent = months[m] + " " + y;

        var first = new Date(y, m, 1);
        var last = new Date(y, m + 1, 0);
        var offset = (first.getDay() + 6) % 7;
        var start = new Date(y, m, 1 - offset);
        var cells = Math.ceil((offset + last.getDate()) / 7) * 7;

        el.calendarGrid.innerHTML = "";

        for(var i=0;i<cells;i++){
          var date = new Date(start);
          date.setDate(start.getDate() + i);
          var key = toKey(date);
          var day = getDay(key);
          var outside = date.getMonth() !== m;
          var btn = document.createElement("button");
          btn.className = "cal-day " + (outside ? "out " : "") + (key === selectedDate ? "selected " : "") + (key === todayKey() ? "today " : "");
          btn.setAttribute("data-key", key);

          var dots = "";
          var shown = 0;
          for(var g=0; g<state.goals.length && shown<3; g++, shown++){
            dots += '<span class="cal-dot '+(day.goals[state.goals[g].id] ? "done" : "")+'"></span>';
          }
          while(shown<3){
            dots += '<span class="cal-dot"></span>';
            shown++;
          }

          btn.innerHTML = '<span class="cal-num">'+date.getDate()+'</span><span class="cal-dots">'+dots+'</span>';
          btn.addEventListener("click", function(){
            selectedDate = this.getAttribute("data-key");
            currentMonth = startOfMonth(parseKey(selectedDate));
            renderAll();
          });
          el.calendarGrid.appendChild(btn);
        }
      }

      function toggleGoal(goalId){
        var day = getDay(selectedDate);
        day.goals[goalId] = !day.goals[goalId];
        saveAndRender("сохранено");
      }

      function removeGoal(goalId){
        var next = [];
        for(var i=0;i<state.goals.length;i++){
          if(state.goals[i].id !== goalId) next.push(state.goals[i]);
        }
        state.goals = next;
        for(var key in state.days){
          if(state.days[key].goals) delete state.days[key].goals[goalId];
        }
        saveAndRender("цель удалена");
      }

      function calcStats(keys){
        var total = 0;
        var done = 0;
        for(var i=0;i<keys.length;i++){
          var day = getDay(keys[i]);
          total += state.goals.length;
          for(var g=0;g<state.goals.length;g++){
            if(day.goals[state.goals[g].id]) done++;
          }
          total += day.tasks.length;
          for(var t=0;t<day.tasks.length;t++){
            if(day.tasks[t].done) done++;
          }
        }
        return { total: total, done: done };
      }

      function calcSystemTotals(keys){
        var out = { strength: 0, cardio: 0 };
        for(var i=0;i<keys.length;i++){
          var day = getDay(keys[i]);
          if(day.goals.strength) out.strength++;
          if(day.goals.cardio) out.cardio++;
        }
        return out;
      }

      function goalStreak(goalId){
        var count = 0;
        var cur = parseKey(selectedDate);
        for(var i=0;i<365;i++){
          if(!getDay(toKey(cur)).goals[goalId]) break;
          count++;
          cur.setDate(cur.getDate() - 1);
        }
        return count;
      }

      function openSettings(){
        el.selectedDateInput.value = selectedDate;
        el.startDateInput.value = state.settings.startDate;
        el.periodInput.value = String(state.settings.months);
        el.strengthTargetInput.value = state.settings.targets.strength;
        el.cardioTargetInput.value = state.settings.targets.cardio;
        el.settingsDrawer.classList.add("open");
        el.backdrop.classList.add("open");
      }

      function closeSettings(){
        el.settingsDrawer.classList.remove("open");
        el.backdrop.classList.remove("open");
      }

      function saveAndRender(message){
        renderAll();
        if(saveTimer) clearTimeout(saveTimer);
        saveTimer = setTimeout(function(){
          saveState();
          if(message) toast(message);
        }, 80);
      }

      function exportData(){
        var payload = {
          app: "Трекер тренировок UI v2",
          exportedAt: new Date().toISOString(),
          state: state,
          selectedDate: selectedDate
        };
        var blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = "training-tracker-backup-" + todayKey() + ".json";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
        toast("экспорт готов");
      }

      function importData(e){
        var file = e.target.files && e.target.files[0];
        if(!file) return;
        var reader = new FileReader();
        reader.onload = function(){
          try {
            var parsed = JSON.parse(reader.result);
            var imported = parsed.state || parsed;
            if(!imported || !imported.days) throw new Error("bad format");
            state = imported;
            selectedDate = parsed.selectedDate || todayKey();
            ensureState();
            currentMonth = startOfMonth(parseKey(selectedDate));
            saveState();
            renderAll();
            toast("импортировано");
          } catch(err) {
            alert("Не получилось импортировать файл. Нужен JSON из этого приложения.");
          }
        };
        reader.readAsText(file);
        e.target.value = "";
      }

      function getWeekKeys(date){
        var start = new Date(date);
        var offset = (start.getDay() + 6) % 7;
        start.setDate(start.getDate() - offset);
        var out = [];
        for(var i=0;i<7;i++){
          var d = new Date(start);
          d.setDate(start.getDate() + i);
          out.push(toKey(d));
        }
        return out;
      }

      function getMonthKeys(date){
        var last = new Date(date.getFullYear(), date.getMonth() + 1, 0);
        var out = [];
        for(var i=1;i<=last.getDate();i++){
          out.push(toKey(new Date(date.getFullYear(), date.getMonth(), i)));
        }
        return out;
      }

      function getVisibleKeys(){
        var start = parseKey(state.settings.startDate);
        var first = new Date(start.getFullYear(), start.getMonth(), 1);
        var last = new Date(first.getFullYear(), first.getMonth() + Number(state.settings.months || 6), 0);
        var out = [];
        var cur = new Date(first);
        while(cur <= last){
          out.push(toKey(cur));
          cur.setDate(cur.getDate() + 1);
        }
        return out;
      }

      function todayKey(){
        return toKey(new Date());
      }

      function toKey(d){
        return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
      }

      function parseKey(key){
        var parts = key.split("-").map(Number);
        return new Date(parts[0], parts[1] - 1, parts[2]);
      }

      function startOfMonth(d){
        return new Date(d.getFullYear(), d.getMonth(), 1);
      }

      function humanDate(d){
        return d.getDate() + " " + months[d.getMonth()] + " " + d.getFullYear();
      }

      function pad(n){
        return String(n).length < 2 ? "0" + n : String(n);
      }

      function trim(s){
        return String(s).replace(/^\s+|\s+$/g, "");
      }

      function escapeHtml(s){
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function toast(text){
        el.toast.textContent = text;
        el.toast.classList.add("show");
        clearTimeout(toast.timer);
        toast.timer = setTimeout(function(){
          el.toast.classList.remove("show");
        }, 1300);
      }

      if("serviceWorker" in navigator && (location.protocol === "https:" || location.hostname === "localhost" || location.hostname === "127.0.0.1")){
        window.addEventListener("load", function(){
          navigator.serviceWorker.register("./sw.js").catch(function(){});
        });
      }
    })();
  </script>
</body>
</html>
